<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scope Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#10131a;--panel:#171b24;--panel2:#1d222d;--line:#2a313f;--ink:#e7ebf2;--dim:#8b95a7;--amber:#ff8a3d;--amber-d:#e0701f;--green:#5fd08a;--red:#ff6b6b}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:16px;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid var(--amber);padding-bottom:10px;margin-bottom:6px}
  h1 span{color:var(--amber)}
  .sub{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.5}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin:12px 0 5px}
  input[type=text],textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:12px;font-family:inherit;font-size:16px;border-radius:4px}
  input:focus,textarea:focus{outline:none;border-color:var(--amber)}
  textarea{min-height:150px;line-height:1.5;resize:vertical;background:var(--panel2)}
  .row{display:flex;gap:10px}.row>div{flex:1}
  button{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.5px;font-size:14px;font-weight:500;padding:14px 16px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:4px;cursor:pointer;width:100%}
  button.primary{background:var(--amber);border-color:var(--amber);color:#10131a;font-weight:700;margin-top:12px}
  button:active{opacity:.7}button:disabled{opacity:.4}
  .mini{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.mini button{font-size:12px;padding:11px 8px;flex:1}
  .status{font-size:12px;color:var(--dim);margin-top:8px;min-height:16px}
  .status.live{color:var(--green)}.status.err{color:var(--red)}
  .room{margin-top:18px;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .rhead{background:var(--bg);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px;color:var(--amber);padding:10px 12px;font-weight:700;border-bottom:1px solid var(--amber);display:flex;justify-content:space-between}
  .rhead .x{color:var(--dim);cursor:pointer;font-family:monospace}
  .item{display:flex;gap:8px;padding:8px;border-bottom:1px solid var(--line);align-items:flex-start}
  .item:last-child{border-bottom:none}
  .item .sc{flex:1.4;background:transparent;border:none;color:var(--ink);font-family:inherit;font-size:14px;padding:4px}
  .item .dt{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--dim);font-family:inherit;font-size:13px;padding:4px 6px;border-radius:3px}
  .item .sc:focus,.item .dt:focus{outline:1px solid var(--amber);color:var(--ink)}
  .item .del{color:var(--dim);cursor:pointer;padding:4px 6px}
  .empty{color:var(--dim);text-align:center;padding:30px 10px;font-size:13px;line-height:1.6}
  .foot{margin-top:20px;color:var(--dim);font-size:11px;line-height:1.6;border-top:1px solid var(--line);padding-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Scope<span>·</span>Builder</h1>
  <div class="sub">Tap the box → tap the 🎤 mic on your keyboard → talk room by room → tap Build.</div>

  <div class="row">
    <div><label>Property Address</label><input id="addr" type="text" placeholder="1423 Maple St, Wylie TX"></div>
    <div style="max-width:120px"><label>Sq Ft</label><input id="sqft" type="text" placeholder="1650"></div>
  </div>
  <div class="row" style="margin-top:0">
    <div><label>Contractor</label><input id="contractor" type="text" placeholder="Contractor name"></div>
    <div><label>Date</label><input id="date" type="text" placeholder="6/8/2026"></div>
  </div>

  <label>Dictate the walk-through</label>
  <textarea id="t" placeholder="Master bath: demo tub, vanity, toilet. Install walk-in shower, tile, vanity, toilet, exhaust fan, lights. Kitchen: demo cabinets, install new cabinets, countertops, backsplash, flooring, lights."></textarea>

  <button id="build" class="primary">▶ Build Scope of Work</button>
  <div id="st" class="status"></div>

  <div id="out"><div class="empty">No rooms yet — dictate above and tap Build.</div></div>

  <div class="mini" id="exp" style="display:none">
    <button id="pdf">🖨 Print / PDF</button>
    <button id="csv">⤓ CSV</button>
    <button id="copy">⧉ Copy</button>
    <button id="clr">New property</button>
  </div>

  <div class="foot">Lines come straight from your words — fill Details as needed. Print / PDF produces the contractor-ready document.</div>
</div>
<script>
const $=i=>document.getElementById(i);
let data=[];

$("build").onclick=async()=>{
  const transcript=$("t").value.trim();
  if(!transcript){setSt("Nothing to build — dictate first.","err");return;}
  $("build").disabled=true; setSt("Building…","live");
  try{
    const r=await fetch("/.netlify/functions/sow",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({transcript})});
    if(!r.ok) throw new Error("server "+r.status);
    const j=await r.json();
    if(!j.rooms||!j.rooms.length) throw new Error("no rooms");
    j.rooms.forEach(rm=>data.push({room:(rm.room||"ROOM").toUpperCase(),items:(rm.items||[]).map(s=>({scope:s,details:""}))}));
    $("t").value=""; render(); setSt("Added "+j.rooms.length+" room(s).","live");
  }catch(e){setSt("Couldn't build that. Try shorter, room-by-room phrasing.","err");}
  finally{$("build").disabled=false;}
};

function setSt(m,c){$("st").textContent=m;$("st").className="status"+(c?" "+c:"")}

function render(){
  if(!data.length){$("out").innerHTML='<div class="empty">No rooms yet — dictate above and tap Build.</div>';$("exp").style.display="none";return;}
  let h="";
  data.forEach((rm,ri)=>{
    h+='<div class="room"><div class="rhead">'+esc(rm.room)+'<span class="x" data-r="'+ri+'">remove</span></div>';
    rm.items.forEach((it,ii)=>{
      h+='<div class="item"><input class="sc" value="'+esc(it.scope)+'" data-r="'+ri+'" data-i="'+ii+'" data-k="scope"><input class="dt" placeholder="details" value="'+esc(it.details)+'" data-r="'+ri+'" data-i="'+ii+'" data-k="details"><span class="del" data-r="'+ri+'" data-i="'+ii+'">✕</span></div>';
    });
    h+='</div>';
  });
  $("out").innerHTML=h; $("exp").style.display="flex";
  $("out").querySelectorAll("input").forEach(el=>el.addEventListener("input",e=>{const t=e.target;data[t.dataset.r].items[t.dataset.i][t.dataset.k]=t.value;}));
  $("out").querySelectorAll(".del").forEach(el=>el.addEventListener("click",e=>{const t=e.target;data[t.dataset.r].items.splice(+t.dataset.i,1);render();}));
  $("out").querySelectorAll(".x").forEach(el=>el.addEventListener("click",e=>{data.splice(+e.target.dataset.r,1);render();}));
}

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;")}

// ---- Print / PDF ----
$("pdf").onclick=()=>{
  const addr=$("addr").value.trim()||"___________________________";
  const sqft=$("sqft").value.trim()||"";
  const contractor=$("contractor").value.trim()||"___________________________";
  const date=$("date").value.trim()||(new Date().toLocaleDateString());
  let sections="";
  data.forEach(rm=>{
    let rows="";
    rm.items.forEach(it=>{
      rows+=`<tr><td>${it.scope||""}</td><td class="det">${it.details||""}</td></tr>`;
    });
    sections+=`
    <div class="section">
      <div class="room-hdr">${rm.room}</div>
      <table><tbody>${rows}</tbody></table>
    </div>`;
  });
  const meta=[sqft?"Sq Ft: "+sqft:"",contractor?"Contractor: "+contractor:"",date?"Date: "+date:""].filter(Boolean).join("&nbsp;&nbsp;|&nbsp;&nbsp;");
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>SOW - ${addr}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;font-size:11pt;color:#111;padding:30px 36px;max-width:820px;margin:0 auto}
  .co{font-size:9pt;color:#777;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
  .title{font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#333;margin-bottom:14px}
  .address{font-size:18pt;font-weight:700;color:#111;margin-bottom:6px;line-height:1.2}
  .meta{font-size:10pt;color:#555;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid #ccc}
  .section{margin-top:22px}
  .room-hdr{font-size:13pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#111;border-top:3px solid #111;padding-top:8px;margin-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:10.5pt}
  td{padding:5px 8px;border-bottom:1px solid #e8e8e8;vertical-align:top}
  td:first-child{width:60%}
  td.det{color:#555;font-size:10pt}
  tr:nth-child(even) td{background:#f9f9f9}
  .col-heads{display:flex;gap:0;font-size:9pt;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;padding:0 8px 4px;border-bottom:1px solid #bbb;margin-bottom:0}
  .col-heads span:first-child{flex:1.66}
  .col-heads span:last-child{flex:1}
  .sigs{margin-top:36px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .sig-line{border-top:1.5px solid #333;padding-top:6px;font-size:10pt;color:#444}
  @media print{body{padding:18px 24px}button{display:none}}
</style>
</head><body>
<div class="co">Intense Holdings Inc</div>
<div class="title">Scope of Work</div>
<div class="address">${addr}</div>
<div class="meta">${meta}</div>
<div class="col-heads"><span>Scope of Work</span><span>Details / Notes</span></div>
${sections}
<div class="sigs">
  <div class="sig-line">Contractor signature &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div>
  <div class="sig-line">Investor signature &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div>
</div>
</body></html>`;
  const w=window.open("","_blank"); w.document.write(html); w.document.close();
  setTimeout(()=>w.print(),400);
};

// ---- CSV ----
$("csv").onclick=()=>{
  const addr=$("addr").value.trim(); const sqft=$("sqft").value.trim();
  const contractor=$("contractor").value.trim(); const date=$("date").value.trim();
  let rows=[["SCOPE OF WORK — INTENSE HOLDINGS INC"],[""],
    ["Property",addr],["Sq Ft",sqft],["Contractor",contractor],["Date",date],[""],
    ["Scope of Work","Details / Notes"]];
  data.forEach(rm=>{rows.push([rm.room,""]);rm.items.forEach(it=>rows.push([it.scope,it.details]));});
  const csv=rows.map(r=>r.map(c=>'"'+(c||"").replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="SOW_"+((addr||"property").replace(/[^a-z0-9]+/gi,"_"))+".csv"; a.click();
};

// ---- Copy ----
$("copy").onclick=async()=>{
  let lines=[];
  data.forEach(rm=>{lines.push(rm.room);rm.items.forEach(it=>lines.push(it.scope+"\t"+it.details));});
  try{await navigator.clipboard.writeText(lines.join("\n"));setSt("Copied.","live");}
  catch(_){setSt("Copy blocked — use CSV.","err");}
};

// ---- Clear ----
$("clr").onclick=()=>{if(confirm("Clear all rooms for a new property?")){data=[];["addr","sqft","contractor","date"].forEach(i=>$(i).value="");render();setSt("");}};
</script>
</body>
</html>
